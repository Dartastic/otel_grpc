name: otel_grpc
description: OpenTelemetry instrumentation for `package:grpc`. Client and
  server interceptors that emit rpc.* spans, inject/extract W3C trace
  context via gRPC metadata, and honor a context-based suppression flag
  to prevent recursion when sharing a channel with the OTLP exporter.
version: 0.1.0-beta.1-wip
repository: https://github.com/dartastic/otel_grpc
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  grpc: ^5.0.0

dev_dependencies:
  pubspec_parse: ^1.5.0
  pub_semver: ^2.0.0
  dart_flutter_team_lints: ^3.5.2
  test: ^1.26.3
